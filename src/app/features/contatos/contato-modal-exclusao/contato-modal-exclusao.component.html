<div class="modal-backdrop">
  <div class="modal listSection">
    <h3>Confirma a exclusão do contato?</h3>

    <label>
      Nome:
      <span>{{user.nome}}</span>
    </label>

    <div class="modal-actions">
      <button (click)="onExcluir()">Sim</button>
      <button (click)="onFecharModalExclusao()">Não</button>
    </div>
  </div>
</div>
