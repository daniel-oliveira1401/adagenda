    <div class="contato-card">
      <p class="name">{{ contato.nome }}</p>
      <hr>
      <p><span class="description">Telefone:</span> {{ contato.telefone }}</p>
      <p *ngIf="contatoTemEmail()" ><span class="description">Email:</span> {{ contato.email }}</p>
      <div class="button-group">
        <button class="btn-editar" (click)="outputAtualizarContato()" >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            fill="currentColor"
            viewBox="0 0 16 16"
          >
            <path
              d="M12.146.854a.5.5 0 0 1 .708 0l2.292 2.292a.5.5 0 0 1 0 .708l-9.439 9.44-3.686.922a.5.5 0 0 1-.605-.605l.922-3.686 9.44-9.439zM11.207 2L3 10.207v1.586h1.586L13 3.793 11.207 2z"
            />
          </svg>
          Editar
        </button>
        
        <button class="btn-excluir" (click)="outputExcluirContato()" >
          <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
            <path
              d="M5.5 5.5v7M8 5.5v7M10.5 5.5v7M1 2h14v1H1V2zm2 1h10l-.5 12H3.5L3 3z"
            />
          </svg>
          Excluir
        </button>
        
      </div>
    </div>
