<div class="modal-backdrop">
  <div class="modal listSection">
    <h3>Editar Contato</h3>

    <label>
      Nome:
      <input [(ngModel)]="user.nome" />
    </label>

    <label>
      Telefone:
      <input [(ngModel)]="user.tel" />
    </label>

    <label>
      Email:
      <input [(ngModel)]="user.email" type="email" />
    </label>

    <div class="modal-actions">
      <button (click)="onFechar()">Cancelar</button>
      <button (click)="onSalvar()">Salvar</button>
    </div>
  </div>
</div>
